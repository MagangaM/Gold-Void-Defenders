<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD VOID DEFENDERS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: #ffd700;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        header {
            width: 100%;
            background: linear-gradient(#1a1a1a, #0a0a0a);
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        h1 {
            margin: 0;
            font-size: 2.4em;
            text-shadow: 0 0 15px #ffd700;
            letter-spacing: 3px;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 1450px;
            margin-top: 10px;
            gap: 15px;
        }
        canvas {
            background: #0f0f0f;
            border: 3px solid #ffd700;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        }
        .sidebar {
            width: 340px;
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            border: 2px solid #ffd700;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .panel {
            background: #111111;
            padding: 14px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #ffd700;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1em;
        }
        button:hover { background: #ffcc00; transform: scale(1.03); }
        .score { font-size: 1.8em; font-weight: bold; color: #ffd700; }
        .level { font-size: 1.4em; font-weight: bold; color: #00ffcc; }
        .leaderboard { max-height: 340px; overflow-y: auto; }
        .lb-item {
            padding: 8px 10px;
            background: #1f1f1f;
            margin: 4px 0;
            border-left: 4px solid #ffd700;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <header>
        <h1>⚔️ GOLD VOID DEFENDERS ⚔️</h1>
    </header>

    <div class="container">
        <canvas id="gameCanvas" width="920" height="620"></canvas>

        <div class="sidebar">
            <div class="panel">
                <div style="display:flex; justify-content:space-between;">
                    <span>SCORE</span>
                    <span class="score" id="score">00000</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:8px;">
                    <span>LEVEL</span>
                    <span class="level" id="level">1</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:8px;">
                    <span>LIVES</span>
                    <span id="lives">❤️❤️❤️❤️</span>
                </div>
            </div>

            <div class="panel">
                <h3 style="margin:0 0 8px 0;">CONTROLS</h3>
                <small>← → : Move<br>SPACE : Fire Repulsors</small>
                <button id="startBtn">START MISSION</button>
            </div>

            <div class="panel">
                <h3>LEADERBOARD</h3>
                <div class="leaderboard" id="leaderboard"></div>
            </div>

            <div style="font-size:0.85em; opacity:0.75; text-align:center;">
                Progressive Difficulty<br>
                Aliens reaching you = Next Level
            </div>
        </div>
    </div>

    <script>
        // GRAPHICS PIPELINE DEMONSTRATION 
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game variables
        let score = 0;
        let level = 1;
        let lives = 4;
        let gameRunning = false;
        let keys = {};
        let lastShot = 0;
        
        // Game Objects
        let player = { x: 450, y: 520, width: 50, height: 40 };
        let bullets = [];
        let alienBullets = [];
        let aliens = [];
        let particles = [];
        
        // Leaderboard
        let leaderboard = JSON.parse(localStorage.getItem('goldVoidLB')) || [];
        
        function updateLeaderboard() {
            leaderboard.sort((a, b) => b.score - a.score);
            if (leaderboard.length > 8) leaderboard.length = 8;
            localStorage.setItem('goldVoidLB', JSON.stringify(leaderboard));
            
            const lbDiv = document.getElementById('leaderboard');
            lbDiv.innerHTML = '';
            leaderboard.forEach((entry, i) => {
                const div = document.createElement('div');
                div.className = 'lb-item';
                div.innerHTML = `<span>#${i+1} ${entry.name}</span><span>${entry.score}</span>`;
                lbDiv.appendChild(div);
            });
        }
        
        function saveScore() {
            const name = prompt("MISSION COMPLETE! Enter your callsign:", "VOID PILOT") || "ANON";
            leaderboard.push({ name: name.substring(0, 12), score: score });
            updateLeaderboard();
        }
        
        //  APPLICATION STAGE 
        function spawnAliens() {
            aliens = [];
            const baseRows = 3;
            const baseCols = 6;
            
            const rows = Math.min(baseRows + Math.floor((level - 1) / 2), 6);
            const cols = Math.min(baseCols + Math.floor((level - 1) / 3), 10);
            
            const types = [
                { color: '#ffd700', points: 50, size: 36, speed: 0.8 + level * 0.08 },
                { color: '#ffaa00', points: 30, size: 32, speed: 1.0 + level * 0.09 },
                { color: '#c41e3a', points: 20, size: 28, speed: 1.2 + level * 0.1 }
            ];
            
            const spacingX = Math.max(65, 820 / cols);
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const typeIndex = Math.min(Math.floor(row / 2), 2);
                    const type = types[typeIndex];
                    
                    aliens.push({
                        x: 80 + col * spacingX,
                        y: 60 + row * 52,
                        width: type.size,
                        height: type.size,
                        type: type,
                        alive: true,
                        dir: 1
                    });
                }
            }
        }
        
        function nextLevel() {
            level++;
            document.getElementById('level').textContent = level;
            score += 800 + (level * 200);
            document.getElementById('score').textContent = score.toString().padStart(5, '0');
            
            // Visual feedback
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * 200,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 45,
                    color: '#ffd700'
                });
            }
            
            spawnAliens();
        }
        
        function updateGame() {
            if (!gameRunning) return;
            
            // Player movement
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= 8;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += 8;
            player.x = Math.max(30, Math.min(canvas.width - 80, player.x));
            
            // Player shooting
            const shootCooldown = Math.max(110, 210 - level * 8);
            if (keys[' '] && Date.now() - lastShot > shootCooldown) {
                bullets.push({ x: player.x + 22, y: player.y - 10, speed: -13 });
                lastShot = Date.now();
            }
            
            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y += bullets[i].speed;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }
            
            // Update alien bullets
            const fireRate = Math.max(0.0025, 0.005 - level * 0.00022);
            for (let i = alienBullets.length - 1; i >= 0; i--) {
                alienBullets[i].y += 4.8 + level * 0.25;
                if (alienBullets[i].y > canvas.height) alienBullets.splice(i, 1);
            }
            
            // Update aliens
            let edgeHit = false;
            let alienSpeedMultiplier = 0.78 + (level * 0.075);
            let alienReachedBottom = false;
            
            aliens.forEach(alien => {
                if (!alien.alive) return;
                alien.x += alienSpeedMultiplier * alien.type.speed * alien.dir;
                
                if (alien.x < 40 || alien.x > canvas.width - 90) edgeHit = true;
                
                // Check if alien reached player area
                if (alien.y + alien.height > player.y - 25) {
                    alienReachedBottom = true;
                }
                
                if (Math.random() < fireRate && alien.y < 340) {
                    alienBullets.push({ x: alien.x + 15, y: alien.y + 30 });
                }
            });
            
            if (edgeHit) {
                aliens.forEach(alien => {
                    if (alien.alive) {
                        alien.dir *= -1;
                        alien.y += Math.max(16, 24 - level * 0.5);
                    }
                });
            }
            
            // === NEW FEATURE: Aliens reach bottom → Next Level ===
            if (alienReachedBottom) {
                nextLevel();
                return;
            }
            
            // Collisions: Player bullets vs Aliens
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = aliens.length - 1; j >= 0; j--) {
                    const a = aliens[j];
                    const b = bullets[i];
                    if (!a.alive) continue;
                    
                    if (b.x > a.x && b.x < a.x + a.width &&
                        b.y > a.y && b.y < a.y + a.height) {
                        
                        a.alive = false;
                        score += a.type.points + (level * 8);
                        document.getElementById('score').textContent = score.toString().padStart(5, '0');
                        
                        for (let k = 0; k < 18; k++) {
                            particles.push({
                                x: a.x + 18,
                                y: a.y + 18,
                                vx: (Math.random() - 0.5) * 9,
                                vy: (Math.random() - 0.5) * 9 - 2,
                                life: 32,
                                color: a.type.color
                            });
                        }
                        bullets.splice(i, 1);
                        break;
                    }
                }
            }
            
            // Collisions: Alien bullets vs Player
            for (let i = alienBullets.length - 1; i >= 0; i--) {
                const ab = alienBullets[i];
                if (ab.x > player.x - 10 && ab.x < player.x + player.width + 10 &&
                    ab.y > player.y && ab.y < player.y + player.height) {
                    
                    lives--;
                    document.getElementById('lives').textContent = '❤️'.repeat(lives);
                    alienBullets.splice(i, 1);
                    
                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }
            
            // Regular wave clear (backup)
            const aliveAliens = aliens.filter(a => a.alive).length;
            if (aliveAliens === 0) {
                nextLevel();
            }
            
            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.25;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('startBtn').textContent = "RESTART MISSION";
            saveScore();
        }
        
        //  GEOMETRY STAGE 
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x + 25, player.y + 20);
            
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.moveTo(0, -22);
            ctx.lineTo(-25, 22);
            ctx.lineTo(25, 22);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(-18, 18);
            ctx.lineTo(18, 18);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#00ddff';
            ctx.beginPath();
            ctx.ellipse(0, -5, 9, 11, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawAlien(alien) {
            if (!alien.alive) return;
            ctx.save();
            ctx.translate(alien.x + alien.width/2, alien.y + alien.height/2);
            
            ctx.fillStyle = alien.type.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, alien.width/2, alien.height/2 - 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#111111';
            ctx.beginPath();
            ctx.ellipse(-9, -6, 6, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(9, -6, 6, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ffe066';
            ctx.fillRect(-12, 8, 24, 5);
            
            ctx.restore();
        }
        
        //  RASTERIZATION STAGE 
        function render() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#0a0a0a');
            grad.addColorStop(1, '#1a1a1a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 140; i++) {
                const x = (i * 37) % canvas.width;
                const y = (i * 23) % (canvas.height - 100);
                ctx.globalAlpha = 0.5 + Math.sin(Date.now()/700 + i) * 0.5;
                ctx.fillRect(x, y, 1.5, 1.5);
            }
            ctx.globalAlpha = 1;
            
            drawPlayer();
            aliens.forEach(alien => drawAlien(alien));
            
            ctx.fillStyle = '#00ffcc';
            bullets.forEach(b => ctx.fillRect(b.x - 3, b.y - 12, 6, 18));
            
            ctx.fillStyle = '#ff4444';
            alienBullets.forEach(ab => ctx.fillRect(ab.x - 3, ab.y, 6, 14));
            
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 32;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 5, 5);
            });
            ctx.globalAlpha = 1.0;
        }
        
        function gameLoop() {
            updateGame();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        function init() {
            document.getElementById('startBtn').addEventListener('click', () => {
                if (gameRunning) return;
                score = 0;
                level = 1;
                lives = 4;
                bullets = [];
                alienBullets = [];
                particles = [];
                
                document.getElementById('score').textContent = '00000';
                document.getElementById('level').textContent = '1';
                document.getElementById('lives').textContent = '❤️❤️❤️❤️';
                document.getElementById('startBtn').textContent = 'MISSION ACTIVE';
                
                spawnAliens();
                gameRunning = true;
            });
            
            window.addEventListener('keydown', e => keys[e.key] = true);
            window.addEventListener('keyup', e => keys[e.key] = false);
            
            updateLeaderboard();
            spawnAliens();
            requestAnimationFrame(gameLoop);
        }
        
        window.onload = init;
    </script>
</body>
</html>
